{% extends "base.html" %}
{% block title %}重置密码 - 校园失物招领系统{% endblock %}
{% block content %}
<section class="auth-modern">
  <div class="auth-visual">
    <p class="eyebrow">New password</p>
    <h1>设置新密码。</h1>
    <p>请设置一个至少 6 位的新密码，重置后即可使用新密码登录。</p>
  </div>
  <form class="panel auth-card modern-card" method="post">
    <p class="eyebrow">Reset password</p>
    <h2>重置密码</h2>
    <label>新密码（至少 6 位）
      <input name="password" type="password" placeholder="输入新密码" required>
    </label>
    <label>确认新密码
      <input name="confirm" type="password" placeholder="再次输入新密码" required>
    </label>
    <button class="btn primary wide" type="submit">确认重置</button>
  </form>
</section>
{% endblock %}
