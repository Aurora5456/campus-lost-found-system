{% extends "base.html" %}
{% block title %}找回密码 - 校园失物招领系统{% endblock %}
{% block content %}
<section class="auth-modern">
  <div class="auth-visual">
    <p class="eyebrow">Reset</p>
    <h1>忘记密码？用绑定邮箱找回。</h1>
    <p>输入学号和注册时绑定的邮箱，我们会发送重置链接。若系统未配置邮件服务，会直接在页面给出重置链接。</p>
  </div>
  <form class="panel auth-card modern-card" method="post">
    <p class="eyebrow">Forgot password</p>
    <h2>找回密码</h2>
    <label>学号
      <input name="student_no" placeholder="例如 20230001" required>
    </label>
    <label>绑定邮箱
      <input name="email" type="email" placeholder="注册时填写的邮箱" required>
    </label>
    <button class="btn primary wide" type="submit">发送重置链接</button>
    {% if reset_link %}
      <p class="form-note">重置链接：<a class="text-link" href="{{ reset_link }}">{{ reset_link }}</a></p>
    {% endif %}
    <a class="text-link" href="{{ url_for('student_login') }}">返回登录</a>
  </form>
</section>
{% endblock %}
