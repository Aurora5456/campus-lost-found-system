{% extends "base.html" %}
{% block title %}学生注册 - 校园失物招领系统{% endblock %}
{% block content %}
<section class="auth-modern">
  <div class="auth-visual">
    <p class="eyebrow">Sign up</p>
    <h1>注册账号，发布与认领校园物品。</h1>
    <p>填写学号、姓名和密码即可注册。建议绑定邮箱，方便接收私信提醒和找回密码。</p>
  </div>
  <form class="panel auth-card modern-card" method="post">
    <p class="eyebrow">Create account</p>
    <h2>学生注册</h2>
    <label>学号
      <input name="student_no" value="{{ form.student_no if form else '' }}" placeholder="例如 20230010" required>
    </label>
    <label>姓名
      <input name="name" value="{{ form.name if form else '' }}" placeholder="你的姓名" required>
    </label>
    <label>邮箱（选填，用于通知和找回密码）
      <input name="email" type="email" value="{{ form.email if form else '' }}" placeholder="you@example.com">
    </label>
    <label>密码（至少 6 位）
      <input name="password" type="password" placeholder="设置登录密码" required>
    </label>
    <label>确认密码
      <input name="confirm" type="password" placeholder="再次输入密码" required>
    </label>
    <button class="btn primary wide" type="submit">注册并登录</button>
    <a class="text-link" href="{{ url_for('student_login') }}">已有账号？去登录</a>
  </form>
</section>
{% endblock %}
