<label>标题
  <input name="title" value="{{ post.title if post else '' }}" placeholder="例如 图书馆遗失黑色保温杯" required>
</label>
<div class="form-grid">
  <label>物品名称
    <input name="item_name" value="{{ post.item_name if post else '' }}" placeholder="黑色保温杯" required>
  </label>
  <label>帖子类型
    <select name="post_type" required>
      <option value="lost" {% if post and post.post_type == 'lost' %}selected{% endif %}>失物</option>
      <option value="found" {% if post and post.post_type == 'found' %}selected{% endif %}>招领</option>
    </select>
  </label>
</div>
<div class="form-grid">
  <label>物品分类
    <select name="category">
      {% for key, label in categories %}
        <option value="{{ key }}" {% if (post and post.category == key) or (not post and key == 'other') %}selected{% endif %}>{{ label }}</option>
      {% endfor %}
    </select>
  </label>
  {% if show_status %}
    <label>处理状态
      <select name="status">
        <option value="open" {% if post and post.status == 'open' %}selected{% endif %}>寻找中 / 招领中</option>
        <option value="resolved" {% if post and post.status == 'resolved' %}selected{% endif %}>已找回 / 已归还</option>
      </select>
    </label>
  {% endif %}
</div>
<label>地点
  <input name="location" value="{{ post.location if post else '' }}" placeholder="丢失或拾取地点" required>
</label>
<label>物品描述
  <textarea name="description" rows="5" placeholder="描述颜色、特征、时间等信息" required>{{ post.description if post else '' }}</textarea>
</label>
<label>联系说明
  <input name="contact_note" value="{{ post.contact_note if post else '' }}" placeholder="例如 请通过站内私信联系" required>
</label>
<label>图片上传（可多选，最多 6 张，自动压缩并生成缩略图）
  <input name="images" type="file" accept=".jpg,.jpeg,.png,.gif" multiple>
</label>
{% if post and post.images %}
  <div class="existing-images">
    <p class="muted">当前图片（勾选可删除）：</p>
    <div class="thumb-row">
      {% for image in post.images %}
        <label class="thumb-item">
          <img src="{{ url_for('static', filename=image.thumb_path or image.image_path) }}" alt="已上传图片">
          <span><input type="checkbox" name="delete_images" value="{{ image.id }}"> 删除</span>
        </label>
      {% endfor %}
    </div>
  </div>
{% endif %}
