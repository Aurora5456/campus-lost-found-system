{% extends "base.html" %}
{% block title %}管理员登录 - 校园失物招领系统{% endblock %}
{% block content %}
<section class="auth-modern admin-auth">
  <div class="auth-visual">
    <p class="eyebrow">Admin Console</p>
    <h1>后台管理，清晰掌控帖子状态。</h1>
    <p>管理员可集中查看发布人信息、搜索帖子、编辑内容并删除无效信息。</p>
    <div class="auth-preview admin-preview">
      <div class="preview-head">
        <span class="badge lost">管理</span>
        <strong>帖子审核队列</strong>
      </div>
      <div class="admin-bars">
        <span style="width: 88%"></span>
        <span style="width: 64%"></span>
        <span style="width: 76%"></span>
      </div>
    </div>
  </div>
  <form class="panel auth-card modern-card" method="post">
    <div class="welcome-drop">您好，欢迎登录</div>
    <p class="eyebrow">Secure Sign in</p>
    <h2>管理员登录</h2>
    <p class="form-note">仅限管理员账号访问后台。</p>
    <label>用户名
      <input name="username" placeholder="admin" required>
    </label>
    <label>密码
      <input name="password" type="password" placeholder="请输入密码" required>
    </label>
    <button class="btn dark wide" type="submit">进入管理后台</button>
    <a class="text-link" href="{{ url_for('student_login') }}">返回学生登录</a>
  </form>
</section>
{% endblock %}
