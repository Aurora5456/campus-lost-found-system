databases:
  - name: campus-lost-found-db
    plan: free
    databaseName: lost_found
    user: lost_found

services:
  - type: web
    name: campus-lost-found
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.4"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: campus-lost-found-db
          property: connectionString
